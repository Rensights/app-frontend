# Production environment overrides for frontend
replicaCount: 2

image:
  repository: ghcr.io/rensights/app-frontend
  tag: ""  # Will be set by CI/CD with pipeline run number
  pullPolicy: Always

service:
  type: ClusterIP
  port: 3000

ingress:
  enabled: true
  # Public HTTPS hits Traefik on this cluster; Kong-class Ingress is ignored by Traefik → default cert for rensights.com
  className: "traefik"
  hosts:
    - host: rensights.com
      paths:
        - path: /
          pathType: Prefix
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  tls:
    - secretName: frontend-rensights-com-tls
      hosts:
        - rensights.com

secrets:
  frontendConfig: frontend-config

extraEnv:
  # Note: NEXT_PUBLIC_API_URL and NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY are read from frontend-config secret
  # These are not needed here when secret is configured
