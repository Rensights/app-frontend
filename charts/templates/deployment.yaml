apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "frontend.fullname" . }}
  labels:
    {{- include "frontend.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "frontend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        reloader.stakater.com/auto: "true"
      labels:
        {{- include "frontend.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "frontend.serviceAccountName" . }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default "latest" }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          env:
            {{- /*
              When frontendConfig secret is set, use ONLY valueFrom for these vars (never mix with
              literal `value` from extraEnv). Mixing breaks server-side apply / rollback merges and
              violates the Deployment schema (value + valueFrom together).
            */}}
            {{- if .Values.secrets.sharedConfig }}
            - name: API_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.sharedConfig }}
                  key: APP_API_URL
                  optional: false
            - name: NEXT_PUBLIC_API_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.sharedConfig }}
                  key: APP_API_URL
                  optional: false
            - name: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.sharedConfig }}
                  key: STRIPE_PUBLISHABLE_KEY
                  optional: true
            - name: NEXT_PUBLIC_GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.sharedConfig }}
                  key: GOOGLE_CLIENT_ID
                  optional: true
            # Grafana Faro RUM collector URL (incl. public app key). docker-entrypoint.sh
            # writes it to window.__FARO_URL__ at startup. optional: RUM is a no-op if unset.
            - name: FARO_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.sharedConfig }}
                  key: FARO_URL
                  optional: true
            {{- else }}
            {{- if hasKey .Values.extraEnv "API_URL" }}
            - name: API_URL
              value: {{ index .Values.extraEnv "API_URL" | quote }}
            {{- end }}
            {{- if hasKey .Values.extraEnv "NEXT_PUBLIC_API_URL" }}
            - name: NEXT_PUBLIC_API_URL
              value: {{ index .Values.extraEnv "NEXT_PUBLIC_API_URL" | quote }}
            {{- end }}
            {{- if hasKey .Values.extraEnv "NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY" }}
            - name: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
              value: {{ index .Values.extraEnv "NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY" | quote }}
            {{- end }}
            {{- if hasKey .Values.extraEnv "NEXT_PUBLIC_GOOGLE_CLIENT_ID" }}
            - name: NEXT_PUBLIC_GOOGLE_CLIENT_ID
              value: {{ index .Values.extraEnv "NEXT_PUBLIC_GOOGLE_CLIENT_ID" | quote }}
            {{- end }}
            {{- end }}
            {{- /* Remaining extraEnv keys (skip keys wired explicitly above when secret is used) */}}
            {{- range $key, $value := .Values.extraEnv }}
            {{- if and (ne $key "API_URL") (ne $key "NEXT_PUBLIC_API_URL") (ne $key "NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY") (ne $key "NEXT_PUBLIC_GOOGLE_CLIENT_ID") }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- end }}
          {{- if .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          {{- end }}
          {{- if .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
