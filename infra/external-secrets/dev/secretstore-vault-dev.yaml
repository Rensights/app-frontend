# SecretStore for HashiCorp Vault (KV v2). Replace VAULT_SERVER_PLACEHOLDER before apply,
# or let CI substitute vars.VAULT_INTERNAL_ADDR (see .github/workflows/ci-cd.yml deploy-dev).
#
# VPS / single-node Kubernetes: http://vault.vault.svc.cluster.local:8200 only resolves if
# Vault is actually running in-cluster (e.g. Helm chart in namespace `vault`). If Vault
# runs on the host VM, another compose stack, or a different host, set server to a URL
# reachable FROM INSIDE A POD (not localhost on your laptop): e.g. http://<node-private-ip>:8200
# or http://<tailscale-ip>:8200. Open the port in the VPS firewall. For HTTPS with a private
# CA, add the Vault provider caBundle (External Secrets Operator docs: Vault provider).
#
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: vault-dev
  namespace: dev
spec:
  provider:
    vault:
      server: "VAULT_SERVER_PLACEHOLDER"
      path: secret
      version: v2
      auth:
        tokenSecretRef:
          name: vault-eso-token
          key: token
