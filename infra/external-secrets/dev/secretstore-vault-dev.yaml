# SecretStore for HashiCorp Vault (KV v2). Replace VAULT_SERVER_PLACEHOLDER before apply,
# or let CI substitute vars.VAULT_INTERNAL_ADDR (see .github/workflows/ci-cd.yml deploy-dev).
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: vault-dev
  namespace: dev
spec:
  provider:
    vault:
      server: "VAULT_SERVER_PLACEHOLDER"
      path: secret
      version: v2
      auth:
        tokenSecretRef:
          name: vault-eso-token
          key: token
