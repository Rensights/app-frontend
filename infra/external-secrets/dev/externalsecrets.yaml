# Sync Kubernetes secrets from Vault KV v2 paths.
# Convention: mount "secret", path secret/data/dev/<logical-name> — all keys under .data
# become keys on the target Secret (match key names your Deployments expect).
# target.deletionPolicy: Retain — deleting an ExternalSecret does NOT delete the Kubernetes Secret.
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: stripe-secrets
  namespace: dev
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: vault-dev
    kind: SecretStore
  target:
    name: stripe-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  dataFrom:
    - extract:
        key: secret/data/dev/stripe-secrets
